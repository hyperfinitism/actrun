name: job-outputs
'on': push
jobs:
  producer:
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.compute.outputs.value }}
    steps:
      - name: Compute
        id: compute
        run: echo "value=from-producer" >> "$GITHUB_OUTPUT"

  consumer:
    needs: producer
    runs-on: ubuntu-latest
    steps:
      - name: Use job output
        run: echo "Got: ${{ needs.producer.outputs.result }}"
