name: Compat Cache Auto Save

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/compat-cache-auto-save.yml

permissions:
  contents: read
  actions: read

jobs:
  save:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Prepare cache
        shell: bash
        run: |
          mkdir -p cache-dir
          printf '%s' ocean > cache-dir/value.txt
      - name: Cache
        id: cache
        uses: actions/cache@v4
        with:
          key: compat-cache-auto-save-v1
          path: cache-dir
      - name: Verify miss output
        shell: bash
        run: |
          test -z "${{ steps.cache.outputs.cache-hit }}"

  restore:
    needs:
      - save
    runs-on: ubuntu-latest
    steps:
      - name: Clear path
        shell: bash
        run: rm -rf cache-dir
      - name: Cache
        id: cache
        uses: actions/cache@v4
        with:
          key: compat-cache-auto-save-v1
          path: cache-dir
      - name: Build report
        shell: bash
        run: |
          mkdir -p report
          printf '%s|%s' \
            "${{ steps.cache.outputs.cache-hit }}" \
            "$(cat cache-dir/value.txt)" > report/result.txt
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: compat-cache-auto-save-report
          path: report/result.txt
